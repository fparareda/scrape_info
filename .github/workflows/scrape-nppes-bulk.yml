name: Scrape · NPPES bulk (US NPI full dataset)
# Uses the standalone run-nppes-bulk.ts entry point (not _scrape-runner.yml)
# because runNppesBulk requires a Supabase client and streams a 9 GB CSV;
# it bypasses the standard dispatch table by design.
on:
  schedule:
    - cron: "0 2 15 * *"  # monthly 15th, 02:00 UTC (after monthly update)
  workflow_dispatch:
    inputs:
      nppes_url:
        description: "Override NPPES bulk CSV URL (optional)"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROLIO_RUN_NPPES_BULK: "true"
      PROLIO_NPPES_BULK_URL: ${{ inputs.nppes_url || '' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Resolve + download + unzip NPI archive
        if: ${{ inputs.nppes_url == '' }}
        run: |
          set -e
          mkdir -p /tmp/nppes
          ZIP_URL=$(curl -sSL https://download.cms.gov/nppes/NPI_Files.html \
            | grep -oE "href='[^']*NPPES_Data_Dissemination_[A-Z][a-z]+_[0-9]{4}_V2\.zip'" \
            | head -1 | sed -E "s|href='./|https://download.cms.gov/nppes/|; s|'$||")
          if [ -z "$ZIP_URL" ]; then
            echo "::error::Could not resolve current NPPES ZIP URL from CMS index"
            exit 1
          fi
          echo "Downloading $ZIP_URL"
          curl -sSL --fail -o /tmp/nppes/npi.zip "$ZIP_URL"
          ls -lh /tmp/nppes/npi.zip
          unzip -o /tmp/nppes/npi.zip -d /tmp/nppes/ | tail -5
          CSV=$(find /tmp/nppes -maxdepth 1 -name 'npidata_pfile_*.csv' ! -name '*FileHeader*' | head -1)
          if [ -z "$CSV" ]; then
            echo "::error::No npidata_pfile_*.csv found in zip"
            ls -la /tmp/nppes
            exit 1
          fi
          echo "PROLIO_NPPES_BULK_URL=$CSV" >> "$GITHUB_ENV"
          echo "Extracted: $CSV ($(stat -c%s "$CSV" | numfmt --to=iec))"
          rm -f /tmp/nppes/npi.zip
      - name: Run NPPES bulk ingest
        run: npm run nppes-bulk
