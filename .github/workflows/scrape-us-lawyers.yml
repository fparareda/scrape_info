name: Scrape · US lawyers (Avvo)

# Avvo lawyer directory (US). JSON-LD Person blocks on
# /all-lawyers/<state>/<city>.html browse pages. Top-20 US cities ×
# 5 practice areas. Immigration lawyers tagged with
# metadata.wedge_specialty='extranjeria' — Prolio's revenue wedge.
# Cap 1000 rows/run. Weekly cadence.

on:
  schedule:
    - cron: "0 13 * * 0" # Sunday 13:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: us-lawyers
