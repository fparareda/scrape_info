name: Scrape · Annuaire Santé Ameli (France)
on:
  schedule:
    # Sunday 11:00 UTC weekly. ~150 MB CSV download + parse, expect
    # 5–10 min per run.
    - cron: "0 11 * * 0"
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: annuaire-sante-ameli
      timeout_minutes: 240
