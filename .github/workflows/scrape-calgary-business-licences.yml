name: Scrape · Calgary Business Licences (Open Data)

# City of Calgary Socrata feed — ~22k AB businesses, no auth.

on:
  schedule:
    - cron: "0 6 11 * *"  # Day 11 06:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: calgary-business-licences
      timeout_minutes: 60
