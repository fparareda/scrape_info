name: Scrape · Wikidata

# Wikidata SPARQL queries for notable entities by category. Low
# volume but high-quality records (verified, with logos, founded
# dates). Monthly cadence — Wikidata edits are slow-moving for
# professional entities.

on:
  schedule:
    - cron: "0 8 1 * *"  # 1st of month 08:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: wikidata
