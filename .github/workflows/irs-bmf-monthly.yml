name: IRS BMF bulk re-ingest (monthly)

# IRS Exempt Orgs Business Master File: monthly per-region CSVs at
# https://www.irs.gov/charities-non-profits/exempt-organizations-business-master-file-extract-eo-bmf
# Four files cover the US (eo1=NE, eo2=MidAtlantic+South, eo3=Central,
# eo4=West). Each iterates over the same CSV → upsert path so the source
# is idempotent on (source, source_id).

on:
  schedule:
    - cron: "0 7 5 * *" # 5th of month 07:00 UTC
  workflow_dispatch:
    inputs:
      limit_per_file:
        description: "Max accepted rows per regional file (default 200000)"
        required: false
        default: "200000"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PROLIO_RUN_IRS_BMF_BULK: "true"
      PROLIO_IRS_BMF_LIMIT: ${{ github.event.inputs.limit_per_file || '200000' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Download regional CSVs
        run: |
          set -e
          mkdir -p /tmp/irs-bmf
          for n in 1 2 3 4; do
            URL="https://www.irs.gov/pub/irs-soi/eo${n}.csv"
            echo "Downloading $URL"
            curl -sSL --fail -o "/tmp/irs-bmf/eo${n}.csv" "$URL"
            ls -lh "/tmp/irs-bmf/eo${n}.csv"
          done

      - name: Ingest eo1.csv
        env:
          PROLIO_IRS_BMF_URL: /tmp/irs-bmf/eo1.csv
        run: npm run irs-bmf-bulk

      - name: Ingest eo2.csv
        env:
          PROLIO_IRS_BMF_URL: /tmp/irs-bmf/eo2.csv
        run: npm run irs-bmf-bulk

      - name: Ingest eo3.csv
        env:
          PROLIO_IRS_BMF_URL: /tmp/irs-bmf/eo3.csv
        run: npm run irs-bmf-bulk

      - name: Ingest eo4.csv
        env:
          PROLIO_IRS_BMF_URL: /tmp/irs-bmf/eo4.csv
        run: npm run irs-bmf-bulk
