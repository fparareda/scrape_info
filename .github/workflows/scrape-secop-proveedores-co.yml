name: Scrape · SECOP proveedores (datos.gov.co CO)
# SECOP II Proveedores Registrados (Socrata qmzu-gj57). ~1.58M state
# providers → category empresa, with municipio + contact. Auto-seeds municipios.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6h (near-continuous backfill via resume cursor; dial back to weekly once cursor wraps to 0)
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: secop-proveedores-co
      timeout_minutes: 300
