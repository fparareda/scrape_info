name: Scrape · NPI Nurses (enfermería US)

# NPI Registry V2 API filtered to nursing taxonomies (RN + LPN + CRNA +
# midwives). 51 states × 4 taxonomies × max 1200 rows ≈ 245k ceiling.
# Cap PROLIO_NPI_NURSES_LIMIT default 150k. Wave 2026-05-18 US → 500k.

on:
  schedule:
    - cron: "0 5 24 * *"  # Day 24 of month at 05:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: npi-nurses
      timeout_minutes: 180
