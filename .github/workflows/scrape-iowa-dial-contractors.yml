name: Scrape · iowa dial contractors
# US multi-cat Iowa (~60k) — auto-wired iowa-dial-contractors. One-shot, monthly.
on:
  schedule:
    - cron: "0 6 14 * *"
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: iowa-dial-contractors
      timeout_minutes: 60
