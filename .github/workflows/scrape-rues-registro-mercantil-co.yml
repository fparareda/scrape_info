name: Scrape · RUES registro mercantil (datos.gov.co CO)
# RUES / Registro Mercantil (Socrata c82u-588k). ~9.3M companies. CIIU→vertical,
# rest → empresa. Geo via camara_comercio. Active matrículas only by default
# (set PROLIO_RUES_ALL_STATES=true to ingest cancelled too). Auto-seeds cities.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6h (near-continuous backfill via resume cursor; dial back to monthly once cursor wraps to 0)
  workflow_dispatch:
# Only one RUES backfill at a time — concurrent runs would race the shared
# scrape_cursor and double-process the same offset window.
concurrency:
  group: scrape-rues-co
  cancel-in-progress: false
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: rues-registro-mercantil-co
      timeout_minutes: 300
