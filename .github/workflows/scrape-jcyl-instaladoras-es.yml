name: Scrape · JCYL Instaladoras Electricidad (ES)
on:
  schedule:
    - cron: "0 6 1 * *"   # monthly, 1st day 06:00 UTC (open-data feed is daily but data changes slowly)
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: jcyl-instaladoras-es
      timeout_minutes: 60
