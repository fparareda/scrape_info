name: Scrape · HIFLD US (DHS Hospitals + UC + Nursing Homes)

# DHS HIFLD Open Data — ArcGIS FeatureServers para hospitales,
# urgent care, nursing homes, EMS stations. ~50k facilities US.
# Wave 2026-05-14 US.

on:
  schedule:
    - cron: "0 5 25 * *"  # Day 25 of month at 05:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: hifld-us
      timeout_minutes: 90
