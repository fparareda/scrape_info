name: OSM locksmith worldwide (monthly)

# Sprint follow-up to the 2026-05-16 plan: lift `cerrajero` coverage
# from ~570 rows to OSM's full worldwide footprint (~30-50k tagged
# locksmiths). One sweep per month is plenty — OSM editing for the
# locksmith long tail moves slowly.

on:
  schedule:
    - cron: "0 7 5 * *" # 5th of each month, 07:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PROLIO_RUN_OSM_LOCKSMITH_WORLDWIDE: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: OSM locksmith worldwide ingest
        run: npm run osm-locksmith-worldwide
