name: Scrape · NPI Registry (US healthcare)

# CMS National Provider Identifier registry — bulk file ingestion.
# Default path: download the weekly NPPES diff (~6 MB) from
# https://download.cms.gov/nppes/NPI_Files.html, stream-parse, upsert.
# Optional baseline (PROLIO_NPI_BASELINE_CSV_URL) for a pre-processed
# healthcare-only snapshot. See src/sources/npi.ts for details.

on:
  schedule:
    - cron: "0 15 * * 0"  # Sundays 15:00 UTC — aligned with NPPES weekly publish (Mon)
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: npi
      timeout_minutes: 240
