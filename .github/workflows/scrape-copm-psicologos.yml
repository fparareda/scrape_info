name: Scrape · ES psicologia
# ES psicologia — auto-wired copm-psicologos. One-shot, monthly.
on:
  schedule:
    - cron: "0 7 6 * *"
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: copm-psicologos
      timeout_minutes: 20
