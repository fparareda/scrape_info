name: Scrape · 411.ca
on:
  schedule:
    # Weekly Saturday 06:00 UTC. Runs ~30-45 min for the full plan
    # (15 categories × ~20 CA cities × up to 5 pages × 2 s).
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated subset (e.g. plumber,electrician)"
        required: false
        type: string
      pages_per_combo:
        description: "Override pages per (category,city) combo (default 5)"
        required: false
        type: string
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: 411-ca
      timeout_minutes: 60
