name: Scrape · 411.ca
# STUB scraper — 411.ca blocks GitHub Actions egress IPs (HTTP 403 on
# every URL regardless of UA, verified runs #26471784610 and #26522409627).
# See src/sources/411-ca.ts for the full diagnosis and restore options.
# No cron schedule — workflow_dispatch only so it doesn't waste runner
# minutes weekly. Re-enable the schedule when a residential proxy or
# self-hosted runner lands.
on:
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: 411-ca
      timeout_minutes: 60
