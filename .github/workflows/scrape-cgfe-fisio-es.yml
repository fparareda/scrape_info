name: Scrape · CGFE (fisioterapeutas España nacional)
# Consejo General de Fisioterapeutas de España — national registry.
# ~69k colegiados across all autonomías. Default run: 5k/run, so
# a full ingestion takes ~14 weekly runs.
# Limit can be raised via PROLIO_CGFE_FISIO_LIMIT env var.
on:
  schedule:
    - cron: "0 5 * * 2"   # weekly Tuesday 05:00 UTC
  workflow_dispatch:
jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: cgfe-fisio-es
      timeout_minutes: 30
