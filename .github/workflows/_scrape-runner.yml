name: _scrape-runner

# Reusable workflow that runs ONE scraper/enricher source per call.
# Per-source workflows (`scrape-osm.yml`, `scrape-borme.yml`, etc.)
# call this with `inputs.source` set to a supported slug; everything
# else stays off so we never accidentally run two heavy sources in
# parallel inside a single GH Actions job.
#
# To add a new source:
#   1. Add its env flag mapping below.
#   2. Create a thin `scrape-{slug}.yml` (or `enrich-{slug}.yml`) with
#      its own cron + `uses: ./.github/workflows/_scrape-runner.yml`.
#
# Source slugs (18 total):
#   Free directories:    osm · ccaa · wikidata · overture
#   Spanish directories: borme · pa · colegios-medicos
#   US/CA directories:   ca-licensing · ca-professional · ca-trades · cslb · npi
#   Marketplaces:        competitor-na · competitor-es-mega · houzz · us-lawyers · us-bars
#   Email discovery:     pattern-mx · email-extractor · email-crawler
#   Enrichment:          crossmatch · gleif · industry-ca
#   Paid:                google
#
# Note: `industry-ca` is wired but blocked — the documented JSON API
# does not exist (pre-flight 2026-04-24). Reserved for a future
# Playwright adapter; today the slug is a no-op.
#
# `google` is paid — only runs from a per-source workflow that
# gates it behind manual workflow_dispatch (Maps free tier exhausted
# on this account until billing renews 2026-05-22).

on:
  workflow_call:
    inputs:
      source:
        description: "Source slug — see list at top of file"
        type: string
        required: true
      shard:
        description: "Shard scope (default: rest — sources are city-independent)"
        type: string
        required: false
        default: "rest"
      timeout_minutes:
        description: "Per-job timeout (default 60)"
        type: number
        required: false
        default: 60
      budget:
        description: "Source-specific run budget (currently only `google` honours this — wired to PROLIO_PLACES_BUDGET in requests, default 6000 ≈ $192 of the $200/mo Maps credit)"
        type: string
        required: false
        default: ""
      category:
        description: "Optional prolio category override (currently only `sirene-insee` honours this — wired to PROLIO_SIRENE_CATEGORY)"
        type: string
        required: false
        default: ""
      state_filter:
        description: "Optional state CVE list (currently only `denue-mx-bulk` honours this — wired to PROLIO_DENUE_MX_BULK_STATES). E.g. '09,15,14' to shard."
        type: string
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
      YELP_DAILY_BUDGET: ${{ inputs.source == 'yelp' && inputs.budget || '' }}
      # Yelp-specific tuning: smaller sink batches avoid Supabase
      # statement-timeout cancellations seen at the default 2000, and
      # daily rotation cycles through US cities across runs (5000 reqs
      # only covers ~12 of ~50 cities per day).
      PROLIO_SINK_BATCH: ${{ inputs.source == 'yelp' && '500' || '' }}
      PROLIO_DAILY_ROTATE: ${{ inputs.source == 'yelp' && 'true' || 'false' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROLIO_SCRAPE_SHARD: ${{ inputs.shard }}
      PROLIO_REQUESTED_SHARD: ${{ inputs.shard }}

      # SOURCE FLAG MATRIX. Exactly one true per run.

      # Per-run budget plumbing. Only `google` reads PROLIO_PLACES_BUDGET
      # today; other sources have their own LIMIT envs hard-coded below.
      PROLIO_PLACES_BUDGET: ${{ inputs.budget }}

      # Map sources / directories
      PROLIO_SCRAPE_GOOGLE:    ${{ inputs.source == 'google' && 'true' || 'false' }}
      PROLIO_SCRAPE_YELP:      ${{ inputs.source == 'yelp' && 'true' || 'false' }}
      PROLIO_SCRAPE_OSM:       ${{ inputs.source == 'osm' && 'true' || 'false' }}
      PROLIO_SCRAPE_CCAA:      ${{ inputs.source == 'ccaa' && 'true' || 'false' }}
      PROLIO_SCRAPE_WIKIDATA:  ${{ inputs.source == 'wikidata' && 'true' || 'false' }}
      PROLIO_SCRAPE_OVERTURE:  ${{ inputs.source == 'overture' && 'true' || 'false' }}
      PROLIO_SCRAPE_BORME:     ${{ inputs.source == 'borme' && 'true' || 'false' }}
      PROLIO_SCRAPE_PA:        ${{ inputs.source == 'pa' && 'true' || 'false' }}
      # Old colegios scraper is permanently disabled (WAF-blocked from
      # datacenter IPs). Run via launchd locally if needed.
      PROLIO_SCRAPE_COLEGIOS: "false"

      # Marketplaces / competitors
      PROLIO_RUN_COMPETITOR_NA:                ${{ inputs.source == 'competitor-na' && 'true' || 'false' }}
      PROLIO_RUN_COMPETITOR_ES_MEGA:           ${{ inputs.source == 'competitor-es-mega' && 'true' || 'false' }}
      PROLIO_RUN_COMPETITOR_SCRAPER:           ${{ inputs.source == 'competitor-es-mega' && 'true' || 'false' }}
      PROLIO_RUN_COMPETITOR_HOUZZ:             ${{ inputs.source == 'houzz' && 'true' || 'false' }}
      PROLIO_RUN_US_LAWYERS:                   ${{ inputs.source == 'us-lawyers' && 'true' || 'false' }}
      PROLIO_RUN_US_BARS:                      ${{ inputs.source == 'us-bars' && 'true' || 'false' }}
      PROLIO_RUN_COMPETITOR_ES_COLEGIOS_MEDICOS: ${{ inputs.source == 'colegios-medicos' && 'true' || 'false' }}
      PROLIO_RUN_COLEGIOS_MEDICOS:             ${{ inputs.source == 'colegios-medicos' && 'true' || 'false' }}
      PROLIO_RUN_COMPETITOR_CA_LICENSING:      ${{ inputs.source == 'ca-licensing' && 'true' || 'false' }}
      PROLIO_RUN_CA_PROFESSIONAL:              ${{ inputs.source == 'ca-professional' && 'true' || 'false' }}
      PROLIO_RUN_CA_TRADES:                    ${{ inputs.source == 'ca-trades' && 'true' || 'false' }}
      PROLIO_RUN_CSLB:                         ${{ inputs.source == 'cslb' && 'true' || 'false' }}

      # Email discovery
      PROLIO_RUN_PATTERN_MX:        ${{ inputs.source == 'pattern-mx' && 'true' || 'false' }}
      PROLIO_RUN_EMAIL_EXTRACTOR:   ${{ inputs.source == 'email-extractor' && 'true' || 'false' }}
      PROLIO_RUN_EMAIL_CRAWLER:     ${{ inputs.source == 'email-crawler' && 'true' || 'false' }}

      # Enrichment
      PROLIO_RUN_CROSSMATCH: ${{ inputs.source == 'crossmatch' && 'true' || 'false' }}
      PROLIO_RUN_GLEIF:      ${{ inputs.source == 'gleif' && 'true' || 'false' }}

      # 2026-05-20 wave: international company registries (hybrid mode —
      # enrichment-primary; ingest only fires for UK CH when both the
      # API key AND PROLIO_UK_CH_INGEST=true are set; USPTO ingest is
      # permanently stubbed to 0 — see uspto-patentsview.ts header).
      PROLIO_RUN_UK_COMPANIES_HOUSE: ${{ inputs.source == 'uk-companies-house' && 'true' || 'false' }}
      PROLIO_RUN_SEC_EDGAR:          ${{ inputs.source == 'sec-edgar' && 'true' || 'false' }}
      PROLIO_RUN_USPTO_PATENTSVIEW:  ${{ inputs.source == 'uspto-patentsview' && 'true' || 'false' }}
      COMPANIES_HOUSE_API_KEY:       ${{ secrets.COMPANIES_HOUSE_API_KEY }}
      USPTO_PATENTSVIEW_API_KEY:     ${{ secrets.USPTO_PATENTSVIEW_API_KEY }}
      # industry-ca was killed pre-flight 2026-04-24 (the documented
      # JSON API at /cc/lgcy/api/v2/corporations does not exist). The
      # slug is wired here so a future Playwright-based adapter can
      # land without a runner edit; today the flag is a no-op.
      PROLIO_RUN_INDUSTRY_CA: ${{ inputs.source == 'industry-ca' && 'true' || 'false' }}

      # US healthcare registry
      PROLIO_RUN_NPI: ${{ inputs.source == 'npi' && 'true' || 'false' }}
      # CMS PECOS (Medicare clinicians) + OIG LEIE (federal exclusions)
      PROLIO_RUN_CMS_PECOS: ${{ inputs.source == 'cms-pecos' && 'true' || 'false' }}
      PROLIO_RUN_OIG_LEIE:  ${{ inputs.source == 'oig-leie' && 'true' || 'false' }}
      # NPI cap bumped 200→1000/state on 2026-05-07. With 51 states ×
      # 5 taxonomies × 1000 the theoretical ceiling is ~255k US
      # healthcare pros per run; in practice the per-state list query
      # taps out before that. This single bump is the highest-leverage
      # US move available (NPI is the only national federal bulk
      # source).
      PROLIO_NPI_LIMIT_PER_STATE: "1000"

      # US contractor / professional state boards (added 2026-05). Each
      # is a CSV bulk download from the state's open-data portal; URLs
      # are best-effort and may need verification on first run (override
      # via PROLIO_<NAME>_CSV).
      PROLIO_RUN_FLORIDA_DBPR:        ${{ inputs.source == 'florida-dbpr' && 'true' || 'false' }}
      PROLIO_RUN_FL_DOH_MQA:          ${{ inputs.source == 'fl-doh-mqa' && 'true' || 'false' }}
      PROLIO_FL_DOH_MQA_LIMIT:        "20000"

      # 2026-05-14 US/MX wave: federal bulk + state HTML (final wiring)
      PROLIO_RUN_HIFLD_US:            ${{ inputs.source == 'hifld-us' && 'true' || 'false' }}
      PROLIO_RUN_RENIECYT_MX:         ${{ inputs.source == 'reniecyt-mx' && 'true' || 'false' }}
      PROLIO_RUN_PADRON_NOTARIOS_FED_MX: ${{ inputs.source == 'padron-notarios-fed-mx' && 'true' || 'false' }}
      PROLIO_RUN_CA_DCA_OPEN_DATA:    ${{ inputs.source == 'ca-dca-open-data' && 'true' || 'false' }}
      PROLIO_RUN_TEXAS_TDLR:          ${{ inputs.source == 'texas-tdlr' && 'true' || 'false' }}
      PROLIO_RUN_ARIZONA_ROC:         ${{ inputs.source == 'arizona-roc' && 'true' || 'false' }}
      PROLIO_RUN_WASHINGTON_LI:       ${{ inputs.source == 'washington-li' && 'true' || 'false' }}
      PROLIO_RUN_OREGON_CCB:          ${{ inputs.source == 'oregon-ccb' && 'true' || 'false' }}
      PROLIO_RUN_NEVADA_NSCB:         ${{ inputs.source == 'nevada-nscb' && 'true' || 'false' }}
      PROLIO_RUN_ILLINOIS_IDFPR:      ${{ inputs.source == 'illinois-idfpr' && 'true' || 'false' }}
      PROLIO_RUN_NEW_YORK_DOS:        ${{ inputs.source == 'new-york-dos' && 'true' || 'false' }}
      PROLIO_RUN_NORTH_CAROLINA_LBC:  ${{ inputs.source == 'north-carolina-lbc' && 'true' || 'false' }}
      PROLIO_RUN_VIRGINIA_DPOR:       ${{ inputs.source == 'virginia-dpor' && 'true' || 'false' }}
      PROLIO_RUN_MASSACHUSETTS_DPL:   ${{ inputs.source == 'massachusetts-dpl' && 'true' || 'false' }}
      PROLIO_RUN_COLORADO_DORA:       ${{ inputs.source == 'colorado-dora' && 'true' || 'false' }}
      PROLIO_RUN_GEORGIA_PLB:         ${{ inputs.source == 'georgia-plb' && 'true' || 'false' }}
      PROLIO_RUN_PENNSYLVANIA_BPOA:   ${{ inputs.source == 'pennsylvania-bpoa' && 'true' || 'false' }}
      PROLIO_RUN_WISCONSIN_DSPS:      ${{ inputs.source == 'wisconsin-dsps' && 'true' || 'false' }}
      PROLIO_RUN_MINNESOTA_DLI:       ${{ inputs.source == 'minnesota-dli' && 'true' || 'false' }}
      PROLIO_RUN_MISSOURI_DPR:        ${{ inputs.source == 'missouri-dpr' && 'true' || 'false' }}
      PROLIO_RUN_OHIO_ELICENSE:       ${{ inputs.source == 'ohio-elicense' && 'true' || 'false' }}
      PROLIO_RUN_MICHIGAN_LARA:       ${{ inputs.source == 'michigan-lara' && 'true' || 'false' }}
      PROLIO_RUN_MARYLAND_DLLR:       ${{ inputs.source == 'maryland-dllr' && 'true' || 'false' }}
      PROLIO_RUN_NEW_JERSEY_DCA:      ${{ inputs.source == 'new-jersey-dca' && 'true' || 'false' }}
      PROLIO_RUN_TENNESSEE_TDCI:      ${{ inputs.source == 'tennessee-tdci' && 'true' || 'false' }}
      PROLIO_RUN_NY_SED_PROFESSIONS:  ${{ inputs.source == 'ny-sed-professions' && 'true' || 'false' }}
      PROLIO_RUN_PA_PALS:             ${{ inputs.source == 'pa-pals' && 'true' || 'false' }}
      PROLIO_RUN_OH_ELICENSE:         ${{ inputs.source == 'oh-elicense' && 'true' || 'false' }}

      # France national registries. CNB via data.gouv.fr CSV API
      # (Lov2 license — commercial OK). Architectes via POST form on
      # annuaire.architectes.org (no captcha; iterates by postal code).
      # CNOM (médecins) blocked by CAPTCHA — not wired here. Sirene
      # deferred until INSEE OAuth credentials are provisioned.
      PROLIO_RUN_CNB_AVOCATS:           ${{ inputs.source == 'cnb-avocats' && 'true' || 'false' }}
      PROLIO_RUN_ARCHITECTES_FR:        ${{ inputs.source == 'architectes-fr' && 'true' || 'false' }}
      PROLIO_RUN_OEC_FR:                ${{ inputs.source == 'oec-fr' && 'true' || 'false' }}
      PROLIO_RUN_ORDRE_VET_FR:          ${{ inputs.source == 'ordre-vet-fr' && 'true' || 'false' }}
      PROLIO_ORDRE_VET_FR_LIMIT:        "2000"
      # 2026-05 consolidation: rpps-fr + annuaire-sante-ameli → annuaire-sante-ans
      # (multi-table ANS extraction covering RPPS+ADELI bascule).
      PROLIO_RUN_ANNUAIRE_SANTE_ANS:    ${{ inputs.source == 'annuaire-sante-ans' && 'true' || 'false' }}

      # 2026-05 wave: FR data.gouv bulk + open data
      PROLIO_RUN_SIRENE_INSEE:          ${{ inputs.source == 'sirene-insee' && 'true' || 'false' }}
      PROLIO_SIRENE_CATEGORY:           ${{ inputs.category }}
      PROLIO_RUN_ADEME_RGE:             ${{ inputs.source == 'ademe-rge' && 'true' || 'false' }}
      PROLIO_RUN_FINESS:                ${{ inputs.source == 'finess' && 'true' || 'false' }}
      PROLIO_RUN_PRIX_CONTROLE_TECHNIQUE: ${{ inputs.source == 'prix-controle-technique' && 'true' || 'false' }}
      PROLIO_RUN_AUTO_ECOLES_FR:        ${{ inputs.source == 'auto-ecoles-fr' && 'true' || 'false' }}
      PROLIO_RUN_GEOMETRES_FR:          ${{ inputs.source == 'geometres-fr' && 'true' || 'false' }}
      PROLIO_RUN_CNOP_PHARMACIENS:      ${{ inputs.source == 'cnop-pharmaciens' && 'true' || 'false' }}

      # 2026-05-18 wave: FR → 500k (Ordres + Chambres)
      PROLIO_RUN_ORDRE_INFIRMIERS_FR:   ${{ inputs.source == 'ordre-infirmiers-fr' && 'true' || 'false' }}
      PROLIO_RUN_ORDRE_PHARMACIENS_FR:  ${{ inputs.source == 'ordre-pharmaciens-fr' && 'true' || 'false' }}
      PROLIO_RUN_CHAMBRE_METIERS_FR:    ${{ inputs.source == 'chambre-metiers-fr' && 'true' || 'false' }}
      PROLIO_CHAMBRE_METIERS_FR_CATEGORY: ${{ inputs.category }}

      # Mexico (added 2026-05-07).
      PROLIO_RUN_DOCTORALIA_MX:         ${{ inputs.source == 'doctoralia-mx' && 'true' || 'false' }}
      PROLIO_RUN_SENASICA_MX_VET:       ${{ inputs.source == 'senasica-mx-vet' && 'true' || 'false' }}
      PROLIO_RUN_DENUE_MX:              ${{ inputs.source == 'denue-mx' && 'true' || 'false' }}
      PROLIO_RUN_CLUES_SINAIS_MX:       ${{ inputs.source == 'clues-sinais-mx' && 'true' || 'false' }}

      # 2026-05 wave: MX federal + state directories
      PROLIO_RUN_NOTARIADO_MX:          ${{ inputs.source == 'notariado-mx' && 'true' || 'false' }}
      PROLIO_RUN_SEDEMA_VERIFICENTROS_CDMX: ${{ inputs.source == 'sedema-verificentros-cdmx' && 'true' || 'false' }}
      PROLIO_RUN_VERIFICACION_EDOMEX:   ${{ inputs.source == 'verificacion-edomex' && 'true' || 'false' }}
      PROLIO_RUN_VERIFICACION_JALISCO:  ${{ inputs.source == 'verificacion-jalisco' && 'true' || 'false' }}
      PROLIO_RUN_CNSF_AGENTES:          ${{ inputs.source == 'cnsf-agentes' && 'true' || 'false' }}
      PROLIO_RUN_COLEGIO_NOTARIOS_CDMX: ${{ inputs.source == 'colegio-notarios-cdmx' && 'true' || 'false' }}
      PROLIO_RUN_FCARM_ARQUITECTOS:     ${{ inputs.source == 'fcarm-arquitectos' && 'true' || 'false' }}
      PROLIO_RUN_FEDMVZ_COLEGIOS_VET:   ${{ inputs.source == 'fedmvz-colegios-vet' && 'true' || 'false' }}
      PROLIO_RUN_CONAHCYT_SNII:         ${{ inputs.source == 'conahcyt-snii' && 'true' || 'false' }}

      # 2026-05-13 wave: MX fraud/risk + regulatory permits
      PROLIO_RUN_SAT_EFOS_EDOS:         ${{ inputs.source == 'sat-efos-edos' && 'true' || 'false' }}
      PROLIO_RUN_SAT_CPR_MX:            ${{ inputs.source == 'sat-cpr-mx' && 'true' || 'false' }}
      PROLIO_RUN_PROFECO_SANCIONADOS:   ${{ inputs.source == 'profeco-sancionados' && 'true' || 'false' }}
      PROLIO_RUN_CRE_PERMISIONARIOS:    ${{ inputs.source == 'cre-permisionarios' && 'true' || 'false' }}

      # 2026-05-13 wave 2: MX business directories (SIEM + COFEPRIS +
      # CNBV + Padrón Ganadero)
      PROLIO_RUN_SIEM:                  ${{ inputs.source == 'siem' && 'true' || 'false' }}
      PROLIO_RUN_COFEPRIS_FARMACIAS:    ${{ inputs.source == 'cofepris-farmacias' && 'true' || 'false' }}
      PROLIO_RUN_CNBV_ENTIDADES:        ${{ inputs.source == 'cnbv-entidades' && 'true' || 'false' }}
      PROLIO_RUN_PADRON_GANADERO_NACIONAL: ${{ inputs.source == 'padron-ganadero-nacional' && 'true' || 'false' }}

      # 2026-05-13 wave 3: MX construction + autos + real estate
      PROLIO_RUN_AMDA_DISTRIBUIDORES:   ${{ inputs.source == 'amda-distribuidores' && 'true' || 'false' }}
      PROLIO_RUN_CMIC_CONSTRUCTORAS:    ${{ inputs.source == 'cmic-constructoras' && 'true' || 'false' }}
      PROLIO_RUN_RE_FRANCHISES_MX:      ${{ inputs.source == 're-franchises-mx' && 'true' || 'false' }}

      # 2026-05-15 wave: MX quick wins (ANTAD retail seeds + EMA/IMSS stubs)
      PROLIO_RUN_ANTAD_ASOCIADOS:       ${{ inputs.source == 'antad-asociados' && 'true' || 'false' }}
      PROLIO_RUN_EMA_ACREDITADOS:       ${{ inputs.source == 'ema-acreditados' && 'true' || 'false' }}
      PROLIO_RUN_IMSS_DIRECTORIO:       ${{ inputs.source == 'imss-directorio' && 'true' || 'false' }}

      # 2026-05-14 wave: MX médicos certificados (CONACEM) — stub honesto.
      # Buscador bloqueado por proxy SSR (backend Flask requiere token
      # server-only). Mantenemos la flag para reactivar sin tocar runner
      # cuando: a) CONACEM libere API pública, o b) un adaptador
      # Playwright resuelva el flujo SSR.
      PROLIO_RUN_CONACEM_MX:            ${{ inputs.source == 'conacem-mx' && 'true' || 'false' }}
      PROLIO_CONACEM_MX_LIMIT:          "80000"

      # 2026-05-14 wave: ES generic open-data catalog
      PROLIO_RUN_DATOS_GOB_ES:          ${{ inputs.source == 'datos-gob-es' && 'true' || 'false' }}
      PROLIO_DATOS_GOB_ES_QUERY:        ${{ inputs.category }}
      PROLIO_DATOS_GOB_ES_LIMIT:        "100000"

      # 2026-05-14 wave: ES quick wins + federation fan-outs
      PROLIO_RUN_GUIADENTISTAS_ES:      ${{ inputs.source == 'guiadentistas-es' && 'true' || 'false' }}
      PROLIO_RUN_DGT_ITV_ES:            ${{ inputs.source == 'dgt-itv-es' && 'true' || 'false' }}
      PROLIO_RUN_RASIC_TALLERES_CAT:    ${{ inputs.source == 'rasic-talleres-cat' && 'true' || 'false' }}
      PROLIO_RUN_CGPE_PROCURADORES:     ${{ inputs.source == 'cgpe-procuradores' && 'true' || 'false' }}

      # 2026-05-15 wave: ES quick wins (habitissimo SSR + Open Data BCN +
      # farmacéuticos guardia federation stub + COMB Barcelona stub)
      PROLIO_RUN_HABITISSIMO_ES:             ${{ inputs.source == 'habitissimo-es' && 'true' || 'false' }}
      PROLIO_HABITISSIMO_ES_LIMIT:           "50000"
      PROLIO_RUN_OPEN_DATA_BCN_LOCALES:      ${{ inputs.source == 'open-data-bcn-locales' && 'true' || 'false' }}
      PROLIO_OPEN_DATA_BCN_LOCALES_LIMIT:    "100000"
      PROLIO_RUN_FARMACEUTICOS_ES_GUARDIA:   ${{ inputs.source == 'farmaceuticos-es-guardia' && 'true' || 'false' }}
      PROLIO_FARMACEUTICOS_ES_GUARDIA_LIMIT: "30000"
      PROLIO_RUN_COMB_BARCELONA:             ${{ inputs.source == 'comb-barcelona' && 'true' || 'false' }}
      PROLIO_COMB_BARCELONA_LIMIT:           "40000"

      # 2026-05-18 wave MX → 500k: 8 new sources (largest MX gap closure).
      # 7 honest stubs documenting blockers; `denue-mx-trades` is live.
      PROLIO_RUN_SIC_SS_MEDICINA:        ${{ inputs.source == 'sic-ss-medicina' && 'true' || 'false' }}
      PROLIO_SIC_SS_MEDICINA_LIMIT:      "350000"
      PROLIO_RUN_CECM_DENTISTAS:         ${{ inputs.source == 'cecm-dentistas' && 'true' || 'false' }}
      PROLIO_CECM_DENTISTAS_LIMIT:       "96000"
      PROLIO_RUN_CENADI_ENFERMERIA:      ${{ inputs.source == 'cenadi-enfermeria' && 'true' || 'false' }}
      PROLIO_CENADI_ENFERMERIA_LIMIT:    "250000"
      PROLIO_RUN_COFEPRIS_FARMACEUTICOS: ${{ inputs.source == 'cofepris-farmaceuticos' && 'true' || 'false' }}
      PROLIO_COFEPRIS_FARMACEUTICOS_LIMIT: "80000"
      PROLIO_RUN_PADRON_ABOGADOS_MX:     ${{ inputs.source == 'padron-abogados-mx' && 'true' || 'false' }}
      PROLIO_PADRON_ABOGADOS_MX_LIMIT:   "250000"
      PROLIO_RUN_FED_ARQUITECTOS_MX:     ${{ inputs.source == 'fed-arquitectos-mx' && 'true' || 'false' }}
      PROLIO_FED_ARQUITECTOS_MX_LIMIT:   "30000"
      PROLIO_RUN_FED_PSICOLOGOS_MX:      ${{ inputs.source == 'fed-psicologos-mx' && 'true' || 'false' }}
      PROLIO_FED_PSICOLOGOS_MX_LIMIT:    "50000"
      PROLIO_RUN_DENUE_MX_TRADES:        ${{ inputs.source == 'denue-mx-trades' && 'true' || 'false' }}
      PROLIO_DENUE_MX_TRADES_LIMIT:      "50000"
      # DENUE BULK — per-state ZIPs, ~5M MX rows raw, filtered SCIAN subset
      PROLIO_RUN_DENUE_MX_BULK:          ${{ inputs.source == 'denue-mx-bulk' && 'true' || 'false' }}
      PROLIO_DENUE_MX_BULK_LIMIT:        "800000"
      PROLIO_DENUE_MX_BULK_STATES:       ${{ inputs.source == 'denue-mx-bulk' && inputs.state_filter || '' }}
      # Fast-path sink for bulk first-imports — skips SELECT-existing
      # round-trips. Only safe for sources that don't share their
      # (source,source_id) namespace with prior rows.
      PROLIO_SINK_SKIP_LOOKUP:           ${{ inputs.source == 'denue-mx-bulk' && 'true' || 'false' }}

      # 2026-05-18 wave CA bulk open-data → 500k
      PROLIO_RUN_STATCAN_CBR:                  ${{ inputs.source == 'statcan-cbr' && 'true' || 'false' }}
      PROLIO_RUN_TORONTO_BUSINESS_LICENSES:    ${{ inputs.source == 'toronto-business-licenses' && 'true' || 'false' }}
      PROLIO_TORONTO_BUSINESS_LICENSES_LIMIT:  "100000"
      PROLIO_RUN_VANCOUVER_BUSINESS_LICENSES:  ${{ inputs.source == 'vancouver-business-licenses' && 'true' || 'false' }}
      PROLIO_VANCOUVER_BUSINESS_LICENSES_LIMIT: "80000"
      PROLIO_RUN_CALGARY_BUSINESS_LICENCES:    ${{ inputs.source == 'calgary-business-licences' && 'true' || 'false' }}
      PROLIO_CALGARY_BUSINESS_LICENCES_LIMIT:  "50000"

      # 2026-05-14 wave: MX small clean directories
      PROLIO_RUN_DRO_CDMX:                       ${{ inputs.source == 'dro-cdmx' && 'true' || 'false' }}
      PROLIO_RUN_PROFEPA_VERIFICENTROS_EDOMEX:   ${{ inputs.source == 'profepa-verificentros-edomex' && 'true' || 'false' }}

      # CA Quebec + BC provincial regulators. HTML scrapers — each was
      # pre-flighted against robots.txt before adding (Law Society BC
      # was excluded because it Disallows the lawyer lookup paths).
      PROLIO_RUN_CMQ:        ${{ inputs.source == 'cmq' && 'true' || 'false' }}
      PROLIO_RUN_BARREAU_QC: ${{ inputs.source == 'barreau-qc' && 'true' || 'false' }}
      PROLIO_RUN_ODQ:        ${{ inputs.source == 'odq' && 'true' || 'false' }}
      PROLIO_RUN_OAQ:        ${{ inputs.source == 'oaq' && 'true' || 'false' }}
      PROLIO_RUN_CPSBC:      ${{ inputs.source == 'cpsbc' && 'true' || 'false' }}
      PROLIO_RUN_SCPP_SK_PHARMACISTS: ${{ inputs.source == 'scpp-sk-pharmacists' && 'true' || 'false' }}

      # 2026-05-15: CA iMIS-hosted public registers
      PROLIO_RUN_ENGINEERS_NS: ${{ inputs.source == 'engineers-ns' && 'true' || 'false' }}
      PROLIO_RUN_NSBS_NS:      ${{ inputs.source == 'nsbs-ns' && 'true' || 'false' }}
      PROLIO_RUN_PEGNL_NL:     ${{ inputs.source == 'pegnl-nl' && 'true' || 'false' }}

      # 2026-05-15 CA quick wins: SVMA SK vets (flat HTML) + CPSNS NS
      # physicians (ASP.NET WebForms POST) + LSNB NB bar (Alinity reuse).
      PROLIO_RUN_SVMA_SK_VETS:        ${{ inputs.source == 'svma-sk-vets' && 'true' || 'false' }}
      PROLIO_RUN_ABVMA_AB_VETS:       ${{ inputs.source == 'abvma-ab-vets' && 'true' || 'false' }}
      PROLIO_RUN_MVMA_MB_VETS:        ${{ inputs.source == 'mvma-mb-vets' && 'true' || 'false' }}

      # 2026-05-26: 411.ca — CA generalist directory (Angular SSR, schema.org)
      PROLIO_RUN_411_CA:              ${{ inputs.source == '411-ca' && 'true' || 'false' }}

      # 2026-05-26: MerchantCircle US — sitemap-sharded generalist scrape
      PROLIO_RUN_MC_US:               ${{ inputs.source == 'merchantcircle-us' && 'true' || 'false' }}
      PROLIO_RUN_CPSNS_NS_PHYSICIANS: ${{ inputs.source == 'cpsns-ns-physicians' && 'true' || 'false' }}
      PROLIO_RUN_LSNB_BAR:            ${{ inputs.source == 'lsnb-bar' && 'true' || 'false' }}

      # 2026-05-18 wave CA → 500k: 8 new CA sources (mostly nursing).
      # All ship as honest stubs today; wiring complete for residential-IP
      # / Playwright drop-ins later.
      PROLIO_RUN_CNO_ONTARIO:         ${{ inputs.source == 'cno-ontario' && 'true' || 'false' }}
      PROLIO_RUN_OIIQ_QUEBEC:         ${{ inputs.source == 'oiiq-quebec' && 'true' || 'false' }}
      PROLIO_RUN_BCCNM_BC:            ${{ inputs.source == 'bccnm-bc' && 'true' || 'false' }}
      PROLIO_RUN_ALBERTA_CRNA:        ${{ inputs.source == 'alberta-crna' && 'true' || 'false' }}
      PROLIO_RUN_OCP_PHARMACY:        ${{ inputs.source == 'ocp-pharmacy' && 'true' || 'false' }}
      PROLIO_RUN_LSO_BAR_ONTARIO:     ${{ inputs.source == 'lso-bar-ontario' && 'true' || 'false' }}
      PROLIO_RUN_OPPQ_QUEBEC_PHYSIO:  ${{ inputs.source == 'oppq-quebec-physio' && 'true' || 'false' }}
      PROLIO_RUN_CVO_VETS_ONTARIO:    ${{ inputs.source == 'cvo-vets-ontario' && 'true' || 'false' }}

      # 2026-05 wave: CA — Alinity/Thentia hosted + provincial regulators
      PROLIO_RUN_TSASK:               ${{ inputs.source == 'tsask' && 'true' || 'false' }}
      PROLIO_RUN_TSBC:                ${{ inputs.source == 'tsbc' && 'true' || 'false' }}
      PROLIO_RUN_CPSA:                ${{ inputs.source == 'cpsa' && 'true' || 'false' }}
      PROLIO_RUN_CPSM:                ${{ inputs.source == 'cpsm' && 'true' || 'false' }}
      PROLIO_RUN_CPSNL:               ${{ inputs.source == 'cpsnl' && 'true' || 'false' }}
      PROLIO_RUN_CPSPEI:              ${{ inputs.source == 'cpspei' && 'true' || 'false' }}
      PROLIO_RUN_CAP_PSYCHOLOGISTS:   ${{ inputs.source == 'cap-psychologists' && 'true' || 'false' }}
      PROLIO_RUN_CPM_PHYSIO:          ${{ inputs.source == 'cpm-physio' && 'true' || 'false' }}
      PROLIO_RUN_LSS_SASKATCHEWAN:    ${{ inputs.source == 'lss-saskatchewan' && 'true' || 'false' }}
      PROLIO_RUN_AMVIC_DEALERS:       ${{ inputs.source == 'amvic-dealers' && 'true' || 'false' }}
      PROLIO_RUN_APEGA:               ${{ inputs.source == 'apega' && 'true' || 'false' }}

      # CA Ontario architects (OAA, added 2026-05-07). HTML scraper
      # behind a Sucuri JS challenge — solved per-run by the source.
      # Listing only exposes name + type + status; addresses live on
      # the practices directory which uses ASP.NET WebForms postbacks
      # (not wired here).
      PROLIO_RUN_OAA:        ${{ inputs.source == 'oaa' && 'true' || 'false' }}

      # ES national colegios. HTML scrapers — datacenter-IP WAF risk
      # similar to paginas-amarillas. If first runs come back empty, the
      # fallback is the local launchd path used by paginas-amarillas
      # (see apps/scraper/launchd/).
      PROLIO_RUN_CGAE:  ${{ inputs.source == 'cgae' && 'true' || 'false' }}
      PROLIO_RUN_CSCAE: ${{ inputs.source == 'cscae' && 'true' || 'false' }}

      # ES federaciones tipo "Consejo General + Ventanilla Única" (Ley
      # 17/2009). Fan-out por colegio provincial/autonómico. Helper en
      # src/sources/_consejo-vu-utils.ts.
      PROLIO_RUN_CGCFE_FISIO:           ${{ inputs.source == 'cgcfe-fisio' && 'true' || 'false' }}
      PROLIO_RUN_COP_PSICOLOGIA:        ${{ inputs.source == 'cop-psicologia' && 'true' || 'false' }}
      PROLIO_RUN_COGITI_INGENIEROS:     ${{ inputs.source == 'cogiti-ingenieros' && 'true' || 'false' }}
      PROLIO_RUN_GRADUADOS_SOCIALES_ES: ${{ inputs.source == 'graduados-sociales-es' && 'true' || 'false' }}

      # ES national Ventanilla Única (Ley 17/2009) — veterinarians (OCV,
      # ~35k) and ópticos-optometristas (CGCOO, ~20k). Both are
      # POST/GET form scrapers; fan out per provincia and (for
      # vucolvet) per surname prefix to respect the 3-char minimum.
      PROLIO_RUN_VUCOLVET:       ${{ inputs.source == 'vucolvet' && 'true' || 'false' }}
      PROLIO_RUN_CGCOO_OPTICOS:  ${{ inputs.source == 'cgcoo-opticos' && 'true' || 'false' }}

      # 2026-05-18 ES wave → 500k. 4 federaciones VU adicionales (Ley
      # 17/2009): enfermería (~320k), farmacia (~78k farmacéuticos), ICCP
      # (~28k ingeniería caminos), COIIM-rama (~50k ing. industrial sup).
      PROLIO_RUN_CGE_ENFERMERIA:    ${{ inputs.source == 'cge-enfermeria' && 'true' || 'false' }}
      PROLIO_RUN_CGCOF_FARMACIA:    ${{ inputs.source == 'cgcof-farmacia' && 'true' || 'false' }}
      PROLIO_RUN_CICCP_INGENIEROS:  ${{ inputs.source == 'ciccp-ingenieros' && 'true' || 'false' }}
      PROLIO_RUN_COIIM_INGENIEROS:  ${{ inputs.source == 'coiim-ingenieros' && 'true' || 'false' }}

      # ES national notariado (CGN) — Consejo General del Notariado.
      # Bulk HTML scrape of ~3,200 notaries, monthly cadence.
      PROLIO_RUN_CGN_NOTARIADO: ${{ inputs.source == 'cgn-notariado' && 'true' || 'false' }}

      # 2026-05-18 wave US → 500k:
      #   - npi-bulk-stream: opt-in monthly full NPPES ZIP (1 GB / 7M rows,
      #     streamed). Wraps `npi.ts`; cap 1M/run.
      #   - npi-nurses / npi-pharmacists: NPI V2 API by taxonomy_description
      #     (enfermeria / farmacia categories).
      #   - foursquare-trades: Foursquare Places v3 (1k/day free; category
      #     parameter selects which trade to fan out across US cities).
      #   - ada-find-a-dentist / usda-aphis-vets / state-bars-bulk: honest
      #     STUBS — datacenter IPs blocked (WAF / 403 / CSRF). Slugs wired
      #     so a future residential-proxy adapter can land without runner
      #     edits.
      PROLIO_RUN_NPI_BULK_STREAM:   ${{ inputs.source == 'npi-bulk-stream' && 'true' || 'false' }}
      PROLIO_RUN_NPI_NURSES:        ${{ inputs.source == 'npi-nurses' && 'true' || 'false' }}
      PROLIO_NPI_NURSES_LIMIT:      "150000"
      PROLIO_RUN_NPI_PHARMACISTS:   ${{ inputs.source == 'npi-pharmacists' && 'true' || 'false' }}
      PROLIO_NPI_PHARMACISTS_LIMIT: "100000"
      PROLIO_RUN_ADA_FIND_A_DENTIST: ${{ inputs.source == 'ada-find-a-dentist' && 'true' || 'false' }}
      PROLIO_RUN_USDA_APHIS_VETS:   ${{ inputs.source == 'usda-aphis-vets' && 'true' || 'false' }}
      PROLIO_RUN_STATE_BARS_BULK:   ${{ inputs.source == 'state-bars-bulk' && 'true' || 'false' }}
      PROLIO_RUN_FOURSQUARE_TRADES: ${{ inputs.source == 'foursquare-trades' && 'true' || 'false' }}
      PROLIO_FOURSQUARE_CATEGORY:   ${{ inputs.category }}
      PROLIO_FOURSQUARE_REQUESTS_PER_RUN: "800"
      FOURSQUARE_API_KEY:           ${{ secrets.FOURSQUARE_API_KEY }}

      # Default budget knobs — per-source workflows can override via
      # GH Actions vars or by setting an `env:` block before `uses:`.
      PROLIO_BORME_DAYS: "7"      # bumped 1→7 days (weekly back-catalogue per run)
      PROLIO_PATTERN_MX_LIMIT: "5000"  # bumped 1k→5k
      PROLIO_HOUZZ_LIMIT: "2000"  # bumped 500→2k
      PROLIO_US_LAWYERS_LIMIT: "5000"  # bumped 1k→5k 2026-05-07
      PROLIO_US_BARS_LIMIT: "5000"                # bumped 1k→5k
      PROLIO_US_BARS_DETAILS: "500"                # bumped 200→500
      PROLIO_COMPETITOR_NA_LIMIT: "5000"           # bumped 2k→5k
      PROLIO_COMPETITOR_ES_MEGA_LIMIT: "5000"      # bumped 2k→5k
      PROLIO_COMPETITOR_CA_LICENSING_LIMIT: "2000" # bumped 500→2k (ECRA has ~18k electricians)
      PROLIO_CA_PROFESSIONAL_LIMIT: "5000"         # bumped 1k→5k (RCDSO alone fetched 20k+)
      PROLIO_CA_TRADES_LIMIT: "10000"              # bumped 2k→10k
      PROLIO_CSLB_LIMIT: "10000"                   # bumped 2k→10k (CSLB has ~280k CA contractors)
      PROLIO_COLEGIOS_MEDICOS_LIMIT: "2000"        # bumped 500→2k
      # Doctoralia ES — bumped 1000→10000 on 2026-05-07. Source covers
      # ES medicina + psicologia + dentista + fisioterapia (4 of 16
      # categories); previous cap delivered ~547 rows total per run
      # which barely scratched the ~150k professionals indexed. 10k
      # keeps each run under 3 hours at the 1 req/sec polite delay.
      PROLIO_DOCTORALIA_LIMIT: "10000"
      PROLIO_EMAIL_EXTRACTOR_LIMIT: "5000"      # bumped 1k→5k 2026-05-07
      PROLIO_EMAIL_CRAWLER_LIMIT: "2000"        # bumped 500→2k
      PROLIO_GLEIF_LIMIT: "20000"               # bumped 10k→20k

      # Verified-working FR/MX sources from earlier runs. Bump aggressively
      # to push past the initial-discovery 5k caps now that we know they
      # land cleanly. Each is a single CSV download or paginated API,
      # so cap bumps don't hammer the host.
      PROLIO_CNB_AVOCATS_LIMIT: "70000"         # full dataset is ~70k abogados
      PROLIO_ARCHITECTES_FR_LIMIT: "20000"      # full ~30k national, capped to be safe
      PROLIO_OEC_FR_LIMIT: "5000"               # OEC ~22k national; HTML scrape, polite cap
      PROLIO_ANNUAIRE_SANTE_AMELI_LIMIT: "100000" # libéral pros FR ~600k, take 100k
      PROLIO_RPPS_FR_LIMIT: "100000"            # RPPS national ~1.7M activity rows; cap to keep run under 4h

      PROLIO_DENUE_MX_LIMIT: "100000"           # DENUE has 5M; 100k spread across 4 sectors
      PROLIO_CLUES_SINAIS_MX_LIMIT: "50000"     # CLUES national ~63k rows; 50k covers operating subset
      PROLIO_SENASICA_MX_VET_LIMIT: "20000"     # full SENASICA ~6k, leave headroom
      PROLIO_DOCTORALIA_MX_LIMIT: "10000"       # boost in case Cloudflare lifts
      PROLIO_OAA_LIMIT: "10000"                 # OAA architects ~8.7k total; 10k headroom
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: scrape ${{ inputs.source }}
        run: npm run scrape
