name: scrape-gmaps-gaps

# Free Google Maps scraper (gosom/google-maps-scraper) — fills the
# city × category coverage gaps catalogued in `data/coverage.csv`.
#
# Two modes:
#   1. Manual (workflow_dispatch) — pick country, top_n, offset. Useful
#      for one-off shards.
#   2. Cron — five countries (ES, FR, MX, US, CA) sharded across the
#      UTC day. Each shard processes 200 cities (~2.5h), well under
#      the 5.5h GA cap. Country + city_offset are derived from the
#      run's UTC hour (see the `shard` step).
#
# Schedule rationale
# ------------------
# We need 5 countries × 5 shards = 25 cron slots, but a day has 24
# minute-0 hour slots. Four countries get the full top-1000 every
# day (5 shards each); CA gets 4 shards (top-800) on most days and
# a 5th shard (top-1000) once a week on Saturdays via an extra slot
# at 06:30 UTC — slotted between ES's last shard (06:00) and FR's
# first (08:00) so it can't collide with another country.
#
# Why this option: dropping CA's 5th shard outright capped CA at
# top-800 forever. Stealing a slot from another country (e.g. US
# runs only 4 shards on Sundays) penalises a bigger market. A
# single weekly minute-30 slot leaves the other 24 cron entries
# untouched, adds just one workflow run/week, and is trivial to
# revert. Trade-off: CA cities 800–999 are refreshed weekly, not
# daily — still a big improvement over "never".
#
#   UTC h:m  | day-of-week | country | shard | city_offset
#   ---------+-------------+---------+-------+------------
#    02:00   |  daily      |   ES    |   1   |      0
#    03:00   |  daily      |   ES    |   2   |    200
#    04:00   |  daily      |   ES    |   3   |    400
#    05:00   |  daily      |   ES    |   4   |    600
#    06:00   |  daily      |   ES    |   5   |    800
#    06:30   |  SAT only   |   CA    |   5   |    800
#    08:00   |  daily      |   FR    |   1   |      0
#    09:00   |  daily      |   FR    |   2   |    200
#    10:00   |  daily      |   FR    |   3   |    400
#    11:00   |  daily      |   FR    |   4   |    600
#    12:00   |  daily      |   FR    |   5   |    800
#    14:00   |  daily      |   MX    |   1   |      0
#    15:00   |  daily      |   MX    |   2   |    200
#    16:00   |  daily      |   MX    |   3   |    400
#    17:00   |  daily      |   MX    |   4   |    600
#    18:00   |  daily      |   MX    |   5   |    800
#    19:00   |  daily      |   US    |   1   |      0
#    20:00   |  daily      |   US    |   2   |    200
#    21:00   |  daily      |   US    |   3   |    400
#    22:00   |  daily      |   US    |   4   |    600
#    23:00   |  daily      |   US    |   5   |    800
#    00:00   |  daily      |   CA    |   1   |      0
#    01:00   |  daily      |   CA    |   2   |    200
#    07:00   |  daily      |   CA    |   3   |    400
#    13:00   |  daily      |   CA    |   4   |    600
#
# Total: 24 runs/day + 1 extra on Saturdays = 169 runs/week.
#
# Free-tier guard: `-c 2`, no proxies. Bump if you wire proxies in.

on:
  workflow_dispatch:
    inputs:
      country:
        description: "ISO country code (ES, FR, MX, US, CA)"
        type: choice
        required: true
        default: "ES"
        options: ["ES", "FR", "MX", "US", "CA"]
      top_n:
        description: "Top N cities by existing-pro count (0 = all ola-1)"
        type: string
        required: true
        default: "200"
      city_offset:
        description: "Skip the first N highest-ranked cities (sharding)"
        type: string
        required: true
        default: "0"
      depth:
        description: "Google Maps scroll depth"
        type: string
        required: true
        default: "1"
      concurrency:
        description: "Playwright workers (no proxies → keep ≤2)"
        type: string
        required: true
        default: "2"
      max_queries:
        description: "Hard cap on queries (0 = no cap)"
        type: string
        required: true
        default: "0"
  schedule:
    # ES top-1000 (offsets 0, 200, 400, 600, 800)
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
    # FR top-1000
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    # MX top-1000
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    # US top-1000
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    # CA top-800 daily (4 free hour slots: 00, 01, 07, 13)
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    # CA 5th shard (offset 800) — Saturdays only, at 06:30 UTC,
    # squeezed between ES's last shard (06:00) and FR's first (08:00).
    # The `shard` step disambiguates this from ES offset=800 by also
    # inspecting the UTC minute.
    - cron: "30 6 * * SAT"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # GA hard cap is 360
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install deps
        run: npm ci || npm install

      - name: Resolve sharding params
        id: shard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            hour=$(date -u +%-H)
            minute=$(date -u +%-M)
            country=""
            offset=""
            # All daily crons fire at minute 0; the CA 5th-shard
            # Saturday slot fires at 06:30. A non-zero minute at
            # hour 6 unambiguously means "CA Sat slot", not ES
            # offset=800. The cron schedule restricts this to SAT,
            # but we sanity-check anyway.
            if [ "$hour" = "6" ] && [ "$minute" -ge 15 ]; then
              country="CA"
              offset=800
              echo "::notice::Saturday CA 5th shard — hour=$hour minute=$minute"
            else
              case "$hour" in
                2)  country="ES"; offset=0   ;;
                3)  country="ES"; offset=200 ;;
                4)  country="ES"; offset=400 ;;
                5)  country="ES"; offset=600 ;;
                6)  country="ES"; offset=800 ;;
                8)  country="FR"; offset=0   ;;
                9)  country="FR"; offset=200 ;;
                10) country="FR"; offset=400 ;;
                11) country="FR"; offset=600 ;;
                12) country="FR"; offset=800 ;;
                14) country="MX"; offset=0   ;;
                15) country="MX"; offset=200 ;;
                16) country="MX"; offset=400 ;;
                17) country="MX"; offset=600 ;;
                18) country="MX"; offset=800 ;;
                19) country="US"; offset=0   ;;
                20) country="US"; offset=200 ;;
                21) country="US"; offset=400 ;;
                22) country="US"; offset=600 ;;
                23) country="US"; offset=800 ;;
                0)  country="CA"; offset=0   ;;
                1)  country="CA"; offset=200 ;;
                7)  country="CA"; offset=400 ;;
                13) country="CA"; offset=600 ;;
                *)
                  echo "::error::Cron fired at unmapped UTC hour=$hour — refusing to scrape with unknown country/offset"
                  exit 1
                  ;;
              esac
            fi
            echo "country=$country" >> "$GITHUB_OUTPUT"
            echo "top_n=200" >> "$GITHUB_OUTPUT"
            echo "city_offset=$offset" >> "$GITHUB_OUTPUT"
            echo "depth=1" >> "$GITHUB_OUTPUT"
            echo "concurrency=2" >> "$GITHUB_OUTPUT"
            echo "max_queries=0" >> "$GITHUB_OUTPUT"
            echo "::notice::Cron mode — country=$country top_n=200 city_offset=$offset (hour $hour UTC)"
          else
            echo "country=${{ inputs.country }}" >> "$GITHUB_OUTPUT"
            echo "top_n=${{ inputs.top_n }}" >> "$GITHUB_OUTPUT"
            echo "city_offset=${{ inputs.city_offset }}" >> "$GITHUB_OUTPUT"
            echo "depth=${{ inputs.depth }}" >> "$GITHUB_OUTPUT"
            echo "concurrency=${{ inputs.concurrency }}" >> "$GITHUB_OUTPUT"
            echo "max_queries=${{ inputs.max_queries }}" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual mode — country=${{ inputs.country }} top_n=${{ inputs.top_n }} city_offset=${{ inputs.city_offset }}"
          fi

      - name: Generate queries.txt for gaps
        run: |
          mkdir -p data
          npm run gmaps-gaps -- \
            --country "${{ steps.shard.outputs.country }}" \
            --top-n "${{ steps.shard.outputs.top_n }}" \
            --city-offset "${{ steps.shard.outputs.city_offset }}" \
            --max "${{ steps.shard.outputs.max_queries }}" \
            --output "data/queries.txt"
          echo "::notice::Generated $(wc -l < data/queries.txt) queries"
          head -5 data/queries.txt

      - name: Build google-maps-scraper
        run: |
          git clone --depth 1 https://github.com/gosom/google-maps-scraper.git /tmp/gmaps
          cd /tmp/gmaps
          go build -o /tmp/gmaps/google-maps-scraper .

      - name: Run scraper
        run: |
          mkdir -p out
          /tmp/gmaps/google-maps-scraper \
            -input data/queries.txt \
            -results out/results.csv \
            -depth "${{ steps.shard.outputs.depth }}" \
            -c "${{ steps.shard.outputs.concurrency }}" \
            -exit-on-inactivity 3m
          echo "::notice::Scraper finished — $(wc -l < out/results.csv) rows"

      - name: Upload results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmaps-results-${{ steps.shard.outputs.country }}-shard${{ steps.shard.outputs.city_offset }}-${{ github.run_number }}
          path: out/results.csv
          if-no-files-found: warn

      - name: Load into Supabase
        if: always() && hashFiles('out/results.csv') != ''
        run: npx tsx src/run-gmaps-loader.ts --input out/results.csv

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "::warning::Telegram secrets not configured — skipping failure notification"
            exit 0
          fi
          COUNTRY="${{ steps.shard.outputs.country }}"
          OFFSET="${{ steps.shard.outputs.city_offset }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ gmaps-gaps cron failed
          country=${COUNTRY:-?} offset=${OFFSET:-?} event=${{ github.event_name }}
          run=${RUN_URL}"
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "disable_web_page_preview=true"
          echo

      - name: Notify Telegram on success (opt-in)
        # Opt-in heartbeat: set repo/org variable GMAPS_NOTIFY_ON_SUCCESS=1
        # to receive a Telegram message on every successful shard. Off by
        # default — 24 cron shards/day would otherwise spam the channel.
        if: success() && vars.GMAPS_NOTIFY_ON_SUCCESS == '1'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "::warning::Telegram secrets not configured — skipping success notification"
            exit 0
          fi
          COUNTRY="${{ steps.shard.outputs.country }}"
          OFFSET="${{ steps.shard.outputs.city_offset }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="✅ gmaps-gaps cron ok
          country=${COUNTRY:-?} offset=${OFFSET:-?}
          run=${RUN_URL}"
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "disable_web_page_preview=true"
          echo
