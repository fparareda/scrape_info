name: scrape-gmaps-gaps

# Free Google Maps scraper (gosom/google-maps-scraper) — fills the
# city × category coverage gaps catalogued in `data/coverage.csv`.
# Manual trigger only: paid Places API still runs on its own cron, and
# this scraper is bounded by Playwright concurrency, not budget.
#
# Default: top 200 ES cities × any missing category = ~1,400 queries
# at ~2h on ubuntu-latest with -c 2 (single hosted runner, no proxies).

on:
  workflow_dispatch:
    inputs:
      country:
        description: "ISO country code (ES, FR, MX, US, CA)"
        type: choice
        required: true
        default: "ES"
        options: ["ES", "FR", "MX", "US", "CA"]
      top_n:
        description: "Top N cities by existing-pro count (0 = all ola-1)"
        type: string
        required: true
        default: "200"
      depth:
        description: "Google Maps scroll depth"
        type: string
        required: true
        default: "1"
      concurrency:
        description: "Playwright workers (no proxies → keep ≤2)"
        type: string
        required: true
        default: "2"
      max_queries:
        description: "Hard cap on queries (0 = no cap)"
        type: string
        required: true
        default: "0"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # GA hard cap is 360
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install deps
        run: npm ci || npm install

      - name: Generate queries.txt for gaps
        run: |
          mkdir -p data
          npm run gmaps-gaps -- \
            --country "${{ inputs.country }}" \
            --top-n "${{ inputs.top_n }}" \
            --max "${{ inputs.max_queries }}" \
            --output "data/queries.txt"
          echo "::notice::Generated $(wc -l < data/queries.txt) queries"
          head -5 data/queries.txt

      - name: Build google-maps-scraper
        run: |
          git clone --depth 1 https://github.com/gosom/google-maps-scraper.git /tmp/gmaps
          cd /tmp/gmaps
          go build -o /tmp/gmaps/google-maps-scraper .

      - name: Run scraper
        run: |
          mkdir -p out
          /tmp/gmaps/google-maps-scraper \
            -input data/queries.txt \
            -results out/results.csv \
            -depth "${{ inputs.depth }}" \
            -c "${{ inputs.concurrency }}" \
            -exit-on-inactivity 3m
          echo "::notice::Scraper finished — $(wc -l < out/results.csv) rows"

      - name: Upload results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmaps-results-${{ inputs.country }}-${{ github.run_number }}
          path: out/results.csv
          if-no-files-found: warn

      - name: Load into Supabase
        run: npx tsx src/run-gmaps-loader.ts --input out/results.csv
