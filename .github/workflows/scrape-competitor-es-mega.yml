name: Scrape · ES marketplaces (Habitissimo + Cronoshare + Páginas Amarillas)

# Spanish trades-marketplace bundle. The "MEGA" adapter inside
# `competitor-es-mega.ts`. These three sites are Prolio's main
# competition in lead-bidding, so we sweep weekly.

on:
  schedule:
    - cron: "0 4 * * 0"  # Sunday 04:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_scrape-runner.yml
    secrets: inherit
    with:
      source: competitor-es-mega
      timeout_minutes: 90
