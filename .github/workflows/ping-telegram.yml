name: Ping Telegram

# Manual smoke test for the Telegram alert pipeline. Runs the same
# probe script you can run locally (`npm run ping:telegram`) but with
# the secrets configured in GitHub. If the message lands in the chat,
# CI-side Telegram alerts are wired correctly.

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run ping:telegram
