name: lint

# Static checks: TypeScript typecheck + actionlint on the workflow
# YAML matrix. Catches the easy class of regressions (broken slugs,
# empty choice options, dangling imports) before they hit a real run.

on:
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"
      - run: actionlint -color
